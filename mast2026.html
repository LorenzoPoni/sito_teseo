<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAST 2026 - Gli Smarriti</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Lato:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="page-transition"></div>
    
    <button class="nav-arrow nav-arrow-left" onclick="goToPage('live.html')">❮</button>
    <button class="nav-arrow nav-arrow-right" onclick="goToPage('index.html')">❯</button>
    
    <nav class="nav-dots">
        <a href="index.html" class="nav-dot">
            <span class="dot-number">1</span>
            <span class="dot-label">Introduzione</span>
        </a>
        <a href="sfida.html" class="nav-dot">
            <span class="dot-number">2</span>
            <span class="dot-label">La sfida</span>
        </a>
        <a href="come.html" class="nav-dot">
            <span class="dot-number">3</span>
            <span class="dot-label">Il come</span>
        </a>
        <a href="live.html" class="nav-dot">
            <span class="dot-number">4</span>
            <span class="dot-label">Live</span>
        </a>
        <a href="mast2026.html" class="nav-dot active">
            <span class="dot-number">5</span>
            <span class="dot-label">MAST 2026</span>
        </a>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>
    </nav>

    <section class="mast-section section">
        <div class="overlay">
            <div class="mast-content">
                <h1 class="mast-title">MAST 2026</h1>
            </div>
        </div>
    </section>

    <footer>
        <p>Project Work - MAST 2026</p>
    </footer>

    <script>
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        function goToPage(page) {
            const transition = document.querySelector('.page-transition');
            transition.classList.add('active');
            setTimeout(() => {
                window.location.href = page;
            }, 400);
        }

        window.addEventListener('load', () => {
            const transition = document.querySelector('.page-transition');
            transition.classList.add('fade-out');
            setTimeout(() => {
                transition.classList.remove('active', 'fade-out');
            }, 400);
        });
    </script>
</body>
</html>
