<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Server</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a1a;
            color: #fff;
        }
        h1 { color: #d4af37; }
        .box {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            border: 1px solid #444;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            border: 1px solid #555;
            background: #1a1a1a;
            color: #fff;
        }
        button {
            padding: 10px 20px;
            background: #d4af37;
            color: #000;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover { background: #e8c547; }
        #response {
            margin-top: 20px;
            padding: 15px;
            background: #0a0a0a;
            border-radius: 4px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .status { color: #4ade80; }
        .error { color: #f87171; }
    </style>
</head>
<body>
    <h1>Test Server AI</h1>
    
    <div class="box">
        <h3>1. Testa connessione server</h3>
        <button onclick="testGet()">GET (leggi reasoning)</button>
    </div>
    
    <div class="box">
        <h3>2. Simula invio da Mind+</h3>
        <input type="text" id="testReasoning" placeholder='Scrivi un test, es: {"reasoning": "Il robot sta analizzando..."}' value='{"reasoning": "Test da browser"}'>
        <button onclick="testPost()">POST (invia reasoning)</button>
    </div>
    
    <div class="box">
        <h3>Risposta Server</h3>
        <div id="response">In attesa...</div>
    </div>
    
    <script>
        function testGet() {
            fetch('http://localhost:3000/api/ai-reasoning')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('response').innerHTML = '<span class="status">SUCCESSO GET:</span>\n' + JSON.stringify(data, null, 2);
                })
                .catch(err => {
                    document.getElementById('response').innerHTML = '<span class="error">ERRORE:</span> ' + err.message;
                });
        }
        
        function testPost() {
            const input = document.getElementById('testReasoning').value;
            let data;
            try {
                data = JSON.parse(input);
            } catch(e) {
                document.getElementById('response').innerHTML = '<span class="error">JSON non valido</span>';
                return;
            }
            
            fetch('http://localhost:3000/api/ai-reasoning', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(r => r.json())
            .then(resp => {
                document.getElementById('response').innerHTML = '<span class="status">SUCCESSO POST:</span>\n' + JSON.stringify(resp, null, 2);
            })
            .catch(err => {
                document.getElementById('response').innerHTML = '<span class="error">ERRORE:</span> ' + err.message;
            });
        }
    </script>
</body>
</html>
