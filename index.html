<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gli Smarriti - Teseo e il Minotauro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
    <main class="hero">
        <div class="overlay">
            <div class="content">
                <h1 class="group-name">Gli Smarriti</h1>
                <div class="divider"></div>
                <p class="tagline">Teseo e il Minotauro</p>
                <p class="description">Un viaggio nel mito, tra storia e tecnologia</p>
                <p class="typewriter">Esplora: <span id="typed-text"></span><span class="cursor">|</span></p>
            </div>
        </div>
    </main>

    <footer>
        <p>Project Work - MAST 2026</p>
    </footer>

    <script>
        const words = ['IoT', 'AI', 'Cyberworld'];
        const typedText = document.getElementById('typed-text');
        let wordIndex = 0;
        let charIndex = 0;
        let isDeleting = false;

        function type() {
            const currentWord = words[wordIndex];
            
            if (isDeleting) {
                typedText.textContent = currentWord.substring(0, charIndex - 1);
                charIndex--;
            } else {
                typedText.textContent = currentWord.substring(0, charIndex + 1);
                charIndex++;
            }

            let typeSpeed = isDeleting ? 50 : 100;

            if (!isDeleting && charIndex === currentWord.length) {
                typeSpeed = 1500;
                isDeleting = true;
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                wordIndex = (wordIndex + 1) % words.length;
                typeSpeed = 300;
            }

            setTimeout(type, typeSpeed);
        }

        setTimeout(type, 1000);
    </script>
</body>
</html>
