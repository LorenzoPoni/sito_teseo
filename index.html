<!DOCTYPE html>
<html lang="it">

    <meta charset="UTF-8">

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="nav-dots">
        <a href="index.html" class="nav-dot active">
            <span class="dot-number">1</span>
            <span class="dot-label">Introduzione</span>
        </a>
        <a href="sfida.html" class="nav-dot">
            <span class="dot-number">2</span>
            <span class="dot-label">La sfida</span>
        </a>
        <a href="come.html" class="nav-dot">
            <span class="dot-number">3</span>
            <span class="dot-label">Il come</span>
        </a>
        <a href="live.html" class="nav-dot">
            <span class="dot-number">4</span>
            <span class="dot-label">Live</span>
        </a>
        <a href="mast2026.html" class="nav-dot">
            <span class="dot-number">5</span>
            <span class="dot-label">MAST 2026</span>
        </a>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>
    </nav>

    <section class="hero section">
        <div class="overlay">
            <div class="content">
                <h1 class="group-name">Gli Smarriti</h1>
                <div class="divider"></div>
                <p class="tagline">Teseo e il Minotauro</p>
                <p class="description">Un viaggio nel mito, tra storia e tecnologia</p>
                <p class="typewriter"><span id="typed-text"></span><span class="cursor">|</span></p>
            </div>
        </div>
    </section>

    <footer>
        <p>Project Work - MAST 2026</p>
    </footer>

    <script>
        const words = ['Internet of Things', 'Artificial Intelligence', 'Cyberworld'];
        const typedText = document.getElementById('typed-text');
        let wordIndex = 0;
        let charIndex = 0;
        let isDeleting = false;

        function type() {
            const currentWord = words[wordIndex];
            
            if (isDeleting) {
                typedText.textContent = currentWord.substring(0, charIndex - 1);
                charIndex--;
            } else {
                typedText.textContent = currentWord.substring(0, charIndex + 1);
                charIndex++;
            }

            let typeSpeed = isDeleting ? 50 : 100;

            if (!isDeleting && charIndex === currentWord.length) {
                typeSpeed = 1500;
                isDeleting = true;
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                wordIndex = (wordIndex + 1) % words.length;
                typeSpeed = 300;
            }

            setTimeout(type, typeSpeed);
        }

        setTimeout(type, 1000);

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
