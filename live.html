<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live - Gli Smarriti</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="nav-dots">
        <a href="index.html" class="nav-dot">
            <span class="dot-number">1</span>
            <span class="dot-label">Introduzione</span>
        </a>
        <a href="mito.html" class="nav-dot">
            <span class="dot-number">2</span>
            <span class="dot-label">Il Mito</span>
        </a>
        <a href="sfida.html" class="nav-dot">
            <span class="dot-number">3</span>
            <span class="dot-label">La sfida</span>
        </a>
        <a href="come.html" class="nav-dot">
            <span class="dot-number">4</span>
            <span class="dot-label">Il come</span>
        </a>
        <a href="live.html" class="nav-dot active">
            <span class="dot-number">5</span>
            <span class="dot-label">Live</span>
        </a>
        <a href="mast2026.html" class="nav-dot">
            <span class="dot-number">6</span>
            <span class="dot-label">MAST 2026</span>
        </a>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>
    </nav>

    <section class="live-section section">
        <div class="overlay">
            <div class="live-wrapper">
                <div class="live-video-section">
                    <h2 class="live-subtitle">Camera</h2>
                    <div class="video-container">
                        <video id="webcam" autoplay playsinline></video>
                        <div class="video-placeholder" id="placeholder">
                            <p>Clicca "Avvia Camera" per iniziare lo streaming</p>
                        </div>
                        <button class="video-fullscreen-btn" id="fullscreenBtn" onclick="toggleVideoFullscreen()" style="display: none;">⛶</button>
                    </div>
                    <div class="btn-group">
                        <button class="camera-btn" id="startBtn" onclick="startCamera()">Avvia Camera</button>
                        <button class="camera-btn stop" id="stopBtn" onclick="stopCamera()" style="display: none;">Ferma Camera</button>
                    </div>
                </div>
                <div class="live-ai-section">
                    <h2 class="live-subtitle">AI Reasoning</h2>
                    <div class="ai-indicator">
                        <span class="ai-dot"></span>
                        <span class="ai-status">Live</span>
                    </div>
                    <div class="reasoning-box" id="reasoningBox">
                        <p id="aiReasoning">In attesa di dati da Mind+...</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <p>Project Work - MAST 2026</p>
    </footer>

    <script>
        let stream = null;
        let pollingInterval = null;

        const API_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:3000/api/ai-reasoning'
            : `${window.location.origin}/api/ai-reasoning`;

        function fetchAIReasoning() {
            fetch(API_URL)
                .then(response => response.json())
                .then(data => {
                    const reasoningEl = document.getElementById('aiReasoning');
                    if (data.reasoning && data.reasoning !== reasoningEl.textContent) {
                        reasoningEl.style.opacity = '0';
                        setTimeout(() => {
                            reasoningEl.textContent = data.reasoning;
                            reasoningEl.style.opacity = '1';
                        }, 300);
                    }
                })
                .catch(err => {
                    console.error('Errore fetch AI:', err);
                });
        }

        function startAIPolling() {
            fetchAIReasoning();
            pollingInterval = setInterval(fetchAIReasoning, 500);
        }

        async function startCamera() {
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(d => d.kind === 'videoinput');
                
                console.log('Camere disponibili:', videoDevices);
                
                const constraints = {
                    video: {
                        width: { ideal: 1280 },
                        height: { ideal: 720 },
                        facingMode: 'environment'
                    }
                };
                
                const droidCamDevice = videoDevices.find(d => 
                    d.label.toLowerCase().includes('droidcam')
                );
                
                if (droidCamDevice) {
                    constraints.video.deviceId = { exact: droidCamDevice.deviceId };
                }
                
                stream = await navigator.mediaDevices.getUserMedia(constraints);
                const video = document.getElementById('webcam');
                video.srcObject = stream;
                video.style.display = 'block';
                document.getElementById('placeholder').style.display = 'none';
                document.getElementById('startBtn').style.display = 'none';
                document.getElementById('stopBtn').style.display = 'inline-block';
                document.getElementById('fullscreenBtn').style.display = 'block';
            } catch (err) {
                alert('Errore accesso alla webcam: ' + err.message + '\n\nProva a:\n1. Usare Chrome\n2. Controllare i permessi del browser\n3. Verificare che DroidCam sia attivo');
            }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            const video = document.getElementById('webcam');
            video.srcObject = null;
            video.style.display = 'none';
            document.getElementById('placeholder').style.display = 'flex';
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('stopBtn').style.display = 'none';
            document.getElementById('fullscreenBtn').style.display = 'none';
        }

        function toggleVideoFullscreen() {
            const videoContainer = document.querySelector('.video-container');
            if (!document.fullscreenElement) {
                videoContainer.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        window.addEventListener('load', startAIPolling);
        window.addEventListener('beforeunload', () => {
            if (pollingInterval) clearInterval(pollingInterval);
        });
    </script>
</body>
</html>
